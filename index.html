<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Monitor</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a1520;
            --panel-bg: rgba(8, 18, 36, 0.94);
            --border: rgba(0, 200, 255, 0.25);
            --cyan: #00d4ff;
            --red: #ff3d5a;
            --green: #00ffaa;
            --text: #7ab8d0;
            --text-bright: #e0f4ff;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            overflow: hidden;
            height: 100vh; width: 100vw;
        }

        canvas { display: block; position: absolute; inset: 0; }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 4px);
            pointer-events: none; z-index: 200;
        }

        /* LEFT PANEL — starts from top now (no header) */
        #left-panel {
            position: absolute; left: 18px; top: 18px;
            width: 255px; z-index: 10;
            display: flex; flex-direction: column; gap: 10px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 4px; padding: 12px 14px;
            backdrop-filter: blur(14px);
        }

        .card-title {
            font-size: 9px; letter-spacing: 3px;
            color: var(--cyan); margin-bottom: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border); padding-bottom: 6px;
        }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .stat-box {
            background: rgba(80,208,240,0.06);
            border: 1px solid rgba(80,208,240,0.18);
            border-radius: 3px; padding: 8px 6px; text-align: center;
        }
        .stat-num {
            font-family: var(--sans); font-weight: 700; font-size: 22px;
            display: block; line-height: 1;
        }
        .stat-lbl { font-size: 8px; letter-spacing: 1.5px; margin-top: 3px; display: block; }
        .c-cyan { color: var(--cyan); }
        .c-red  { color: var(--red); }
        .c-green{ color: var(--green); }

        .rate-row { margin-top: 8px; }
        .rate-label { font-size: 9px; letter-spacing: 1px; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .rate-track { height: 5px; background: rgba(80,208,240,0.1); border-radius: 3px; overflow: hidden; }
        .rate-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--red)); border-radius: 3px; transition: width 0.6s; }

        .country-row {
            display: flex; align-items: center;
            padding: 4px 0; font-size: 10px;
            border-bottom: 1px solid rgba(80,208,240,0.08);
        }
        .country-row:last-child { border-bottom: none; }
        .country-rank { color: var(--cyan); width: 14px; font-size: 9px; opacity: 0.55; }
        .country-name { color: var(--text-bright); flex: 1; margin: 0 6px; font-size: 10px; }
        .country-bar-wrap { flex: 1; height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin: 0 6px; }
        .country-bar-fill { height: 100%; background: var(--cyan); border-radius: 2px; transition: width 0.5s; }
        .country-cnt { color: var(--cyan); font-size: 10px; min-width: 26px; text-align: right; }

        .filter-row { display: flex; gap: 6px; }
        .fbtn {
            flex: 1; padding: 6px 0;
            border: 1px solid var(--border);
            background: transparent; color: var(--text);
            font-family: var(--mono); font-size: 9px;
            letter-spacing: 1px; cursor: pointer;
            border-radius: 3px; transition: all 0.2s;
            text-transform: uppercase;
        }
        .fbtn:hover { border-color: var(--cyan); color: var(--cyan); }
        .fbtn.f-all { background: rgba(80,208,240,0.13); border-color: var(--cyan); color: var(--cyan); }
        .fbtn.f-sus { background: rgba(240,96,112,0.13); border-color: var(--red);  color: var(--red);  }
        .fbtn.f-pause { background: rgba(0,212,255,0.08); border-color: var(--cyan); color: var(--cyan); }
        .fbtn.f-paused { background: rgba(255,200,0,0.10); border-color: #ffcc00; color: #ffcc00; }

        #timeline {
            position: absolute; bottom: 18px; left: 18px; right: 18px;
            z-index: 10;
        }
        #timeline .card { padding: 10px 14px; }
        #timeline-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        .legend { display: flex; gap: 14px; font-size: 9px; letter-spacing: 1px; }
        .leg-item { display: flex; align-items: center; gap: 5px; }
        .leg-dot { width: 7px; height: 7px; border-radius: 50%; }
        .leg-dot.r { background: var(--red);  box-shadow: 0 0 5px var(--red);  }
        .leg-dot.b { background: var(--cyan); box-shadow: 0 0 5px var(--cyan); }
        #timeline-svg { width: 100%; height: 55px; overflow: visible; }

        #tooltip {
            position: absolute; z-index: 50;
            background: rgba(10,18,36,0.97); border: 1px solid var(--cyan);
            border-radius: 4px; padding: 8px 12px;
            font-size: 10px; pointer-events: none;
            display: none; letter-spacing: 1px;
        }
        #tooltip .t-ip  { color: var(--text-bright); margin-bottom: 3px; }
        #tooltip .t-ts  { color: var(--text); font-size: 9px; margin-bottom: 2px; }
        #tooltip .t-sus { font-size: 10px; font-weight: bold; }
        #tooltip .t-sus.s { color: var(--red);   }
        #tooltip .t-sus.n { color: var(--green); }
    </style>
</head>
<body>
    <canvas id="globe-canvas"></canvas>
    <div id="tooltip">
        <div class="t-ip" id="tt-ip"></div>
        <div class="t-ts" id="tt-ts"></div>
        <div class="t-sus" id="tt-sus"></div>
    </div>

    <div id="left-panel">
        <div class="card">
            <div class="card-title">// Live Statistics</div>
            <div class="stat-grid">
                <div class="stat-box"><span class="stat-num c-cyan" id="st-total">0</span><span class="stat-lbl c-cyan">TOTAL</span></div>
                <div class="stat-box"><span class="stat-num c-red"  id="st-sus">0</span>  <span class="stat-lbl c-red">THREAT</span></div>
                <div class="stat-box"><span class="stat-num c-green" id="st-nor">0</span><span class="stat-lbl c-green">CLEAN</span></div>
            </div>
            <div class="rate-row">
                <div class="rate-label"><span>Threat Rate</span><span id="rate-pct" class="c-red">0%</span></div>
                <div class="rate-track"><div class="rate-fill" id="rate-bar" style="width:0%"></div></div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">// Top Source Countries</div>
            <div id="top-countries"></div>
        </div>

        <div class="card">
            <div class="card-title">// Display Filter</div>
            <div class="filter-row">
                <button class="fbtn f-all" id="btn-all" onclick="setFilter('all')">All</button>
                <button class="fbtn" id="btn-sus" onclick="setFilter('sus')">Threats</button>
                <button class="fbtn" id="btn-nor" onclick="setFilter('nor')">Clean</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">// Globe Control</div>
            <button class="fbtn f-pause" id="btn-pause" onclick="toggleRotation()" style="width:100%">⏸ Pause Rotation</button>
        </div>
    </div>

    <div id="timeline">
        <div class="card">
            <div id="timeline-header">
                <div class="card-title" style="margin-bottom:0">// Activity Timeline</div>
                <div class="legend">
                    <div class="leg-item"><div class="leg-dot r"></div><span>Threats</span></div>
                    <div class="leg-item"><div class="leg-dot b"></div><span>Clean</span></div>
                </div>
            </div>
            <svg id="timeline-svg"></svg>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script>
    const canvas   = document.getElementById('globe-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 2.6;

    scene.add(new THREE.AmbientLight(0xffffff, 1.1));
    const sun = new THREE.DirectionalLight(0xaaccff, 0.35);
    sun.position.set(4, 2, 3);
    scene.add(sun);

    // stars
    const starBuf = new Float32Array(3000 * 3);
    for (let i = 0; i < starBuf.length; i++) starBuf[i] = (Math.random() - 0.5) * 600;
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(starBuf, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, transparent: true, opacity: 0.5 })));

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // ─── TEXTURE ──────────────────────────────────────────────────────────────
    // Draws equirectangular canvas texture: ocean + land
    function buildGlobeTexture(world) {
        const W = 2048, H = 1024;
        const c = document.createElement('canvas');
        c.width = W; c.height = H;
        const ctx = c.getContext('2d');

        // ocean
        ctx.fillStyle = '#0d2840';
        ctx.fillRect(0, 0, W, H);

        // land
        ctx.fillStyle = '#3a6b2e';

        // standard equirectangular — matches Three.js UV
        const project = ([lon, lat]) => [
            (lon + 180) / 360 * W,
            (90  - lat) / 180 * H
        ];

        const drawPolygon = (rings) => {
            const path = new Path2D();
            rings.forEach(ring => {
                ring.forEach(([lon, lat], i) => {
                    const [x, y] = project([lon, lat]);
                    i === 0 ? path.moveTo(x, y) : path.lineTo(x, y);
                });
                path.closePath();
            });
            ctx.fill(path, 'evenodd');
            // coastline stroke
            ctx.strokeStyle = 'rgba(80,180,100,0.35)';
            ctx.lineWidth = 0.8;
            ctx.stroke(path);
        };

        const land = topojson.feature(world, world.objects.land);
        const features = Array.isArray(land.features) ? land.features : [land];
        features.forEach(f => {
            if (!f.geometry) return;
            if (f.geometry.type === 'Polygon')
                drawPolygon(f.geometry.coordinates);
            else if (f.geometry.type === 'MultiPolygon')
                f.geometry.coordinates.forEach(poly => drawPolygon(poly));
        });

        // polar ice caps
        const northCapY = (90 - 84) / 180 * H;
        const ng = ctx.createLinearGradient(0, 0, 0, northCapY);
        ng.addColorStop(0,   'rgba(170,205,225,0.72)');
        ng.addColorStop(0.55,'rgba(140,185,210,0.35)');
        ng.addColorStop(1,   'rgba(120,170,200,0)');
        ctx.fillStyle = ng;
        ctx.fillRect(0, 0, W, northCapY);

        // south pole cap
        const southCapY = (90 - (-76)) / 180 * H;
        const sg = ctx.createLinearGradient(0, H, 0, southCapY);
        sg.addColorStop(0,   'rgba(185,218,235,0.72)');
        sg.addColorStop(0.55,'rgba(160,200,220,0.35)');
        sg.addColorStop(1,   'rgba(140,185,210,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(0, southCapY, W, H - southCapY);

        const tex = new THREE.CanvasTexture(c);
        return tex;
    }

    // ─── LAT/LON → 3D ────────────────────────────────────────────────────────
    function ll2v3(lat, lon, r = 1) {
        const phi   = (90 - lat)  * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        return new THREE.Vector3(
            -r * Math.sin(phi) * Math.cos(theta),
             r * Math.cos(phi),
             r * Math.sin(phi) * Math.sin(theta)
        );
    }

    // ─── BORDERS (antimeridian-safe) ─────────────────────────────────────────
    function drawBorders(world) {
        const mat = new THREE.LineBasicMaterial({ color: 0x5ab8d8, transparent: true, opacity: 0.55 });

        const drawSafe = coords => {
            let seg = [];
            for (let i = 0; i < coords.length; i++) {
                if (i > 0 && Math.abs(coords[i][0] - coords[i-1][0]) > 180) {
                    if (seg.length > 1)
                        globeGroup.add(new THREE.Line(
                            new THREE.BufferGeometry().setFromPoints(seg.map(([lo,la]) => ll2v3(la, lo, 1.003))), mat));
                    seg = [];
                }
                seg.push(coords[i]);
            }
            if (seg.length > 1)
                globeGroup.add(new THREE.Line(
                    new THREE.BufferGeometry().setFromPoints(seg.map(([lo,la]) => ll2v3(la, lo, 1.003))), mat));
        };

        const borders = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
        if (borders.type === 'MultiLineString') borders.coordinates.forEach(drawSafe);
        else if (borders.type === 'LineString') drawSafe(borders.coordinates);
    }

    // ─── COUNTRY LABELS ───────────────────────────────────────────────────────
    const ISO_NAMES = {
        4:'Afghanistan',12:'Algeria',24:'Angola',32:'Argentina',
        36:'Australia',50:'Bangladesh',68:'Bolivia',
        76:'Brazil',104:'Myanmar',120:'Cameroon',124:'Canada',
        152:'Chile',156:'China',170:'Colombia',180:'DR Congo',192:'Cuba',
        218:'Ecuador',818:'Egypt',231:'Ethiopia',246:'Finland',
        250:'France',276:'Germany',300:'Greece',356:'India',
        360:'Indonesia',364:'Iran',368:'Iraq',380:'Italy',392:'Japan',
        398:'Kazakhstan',404:'Kenya',408:'N.Korea',410:'S.Korea',
        434:'Libya',484:'Mexico',504:'Morocco',516:'Namibia',
        554:'New Zealand',566:'Nigeria',578:'Norway',586:'Pakistan',
        604:'Peru',608:'Philippines',616:'Poland',620:'Portugal',
        642:'Romania',643:'Russia',682:'Saudi Arabia',710:'S.Africa',
        724:'Spain',729:'Sudan',752:'Sweden',
        764:'Thailand',792:'Turkey',804:'Ukraine',826:'UK',
        840:'USA',858:'Uruguay',862:'Venezuela',704:'Vietnam',716:'Zimbabwe'
    };

    function makeLabel(text) {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.font = 'bold 22px "Share Tech Mono", monospace';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        // halo outline
        ctx.strokeStyle = 'rgba(0,0,0,0.85)';
        ctx.lineWidth = 4;
        ctx.strokeText(text, 128, 32);
        // fill
        ctx.fillStyle = 'rgba(210,240,255,0.95)';
        ctx.fillText(text, 128, 32);
        const tex = new THREE.CanvasTexture(canvas);
        const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
        const sprite = new THREE.Sprite(mat);
        sprite.scale.set(0.38, 0.095, 1);
        return sprite;
    }

    function polyCentroid(coords) {
        // outer ring average
        const ring = coords[0];
        let ax = 0, ay = 0, n = ring.length;
        for (const [lo, la] of ring) { ax += lo; ay += la; }
        return [ax / n, ay / n];
    }

    // polygon area in deg² (Shoelace formula)
    function ringArea(ring) {
        let a = 0;
        for (let i = 0, j = ring.length - 1; i < ring.length; j = i++)
            a += ring[j][0] * ring[i][1] - ring[i][0] * ring[j][1];
        return Math.abs(a) / 2;
    }

    function drawLabels(world) {
        const features = topojson.feature(world, world.objects.countries).features;
        for (const f of features) {
            const name = ISO_NAMES[+f.id];
            if (!name || !f.geometry) continue;

            let centroid, area = 0;
            if (f.geometry.type === 'Polygon') {
                area = ringArea(f.geometry.coordinates[0]);
                centroid = polyCentroid(f.geometry.coordinates);
            } else if (f.geometry.type === 'MultiPolygon') {
                // pick largest polygon by area
                let biggest = f.geometry.coordinates[0];
                let maxA = 0;
                for (const p of f.geometry.coordinates) {
                    const a = ringArea(p[0]);
                    if (a > maxA) { maxA = a; biggest = p; }
                }
                area = maxA;
                centroid = polyCentroid(biggest);
            }
            if (!centroid) continue;

            // skip countries smaller than ~28 deg² (Belgium, NL, etc.)
            if (area < 28) continue;

            const sprite = makeLabel(name);
            sprite.position.copy(ll2v3(centroid[1], centroid[0], 1.06));
            globeGroup.add(sprite);
        }
    }

    fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
        .then(r => r.json())
        .then(world => {
            const texture = buildGlobeTexture(world);
            globeGroup.add(new THREE.Mesh(
                new THREE.SphereGeometry(1, 128, 128),
                new THREE.MeshLambertMaterial({ map: texture })
            ));
            drawBorders(world);
            drawLabels(world);
        })
        .catch(e => {
            console.warn('world-atlas unavailable', e);
            globeGroup.add(new THREE.Mesh(
                new THREE.SphereGeometry(1, 128, 128),
                new THREE.MeshLambertMaterial({ color: 0x0d2840 })
            ));
        });

    // ─── PACKET DOTS ─────────────────────────────────────────────────────────
    const activePoints = [];
    let currentFilter  = 'all';

    function shouldShow(isSus) {
        if (currentFilter === 'all') return true;
        if (currentFilter === 'sus') return isSus;
        return !isSus;
    }

    function spawnPoint(packet) {
        const isSus = packet.suspicious > 0.5;
        const color = isSus ? new THREE.Color(0xff3d5a) : new THREE.Color(0x00d4ff);
        const r     = isSus ? 0.022 : 0.016;

        const mat  = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1.0 });
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 8), mat);
        mesh.position.copy(ll2v3(packet.lat, packet.lon, 1.005));
        mesh.visible = shouldShow(isSus);
        globeGroup.add(mesh);

        activePoints.push({ mesh, mat, isSus, packet });
    }

    // ─── MOUSE DRAG ──────────────────────────────────────────────────────────
    let dragging = false, prevX = 0, prevY = 0;
    canvas.addEventListener('mousedown', e => { dragging=true; prevX=e.clientX; prevY=e.clientY; });
    canvas.addEventListener('mouseup',   () => dragging = false);
    canvas.addEventListener('mouseleave',() => dragging = false);
    canvas.addEventListener('mousemove', e => {
        if (!dragging) return;
        globeGroup.rotation.x += (e.clientY - prevY) * 0.005;
        globeGroup.rotation.y += (e.clientX - prevX) * 0.005;
        prevX = e.clientX; prevY = e.clientY;
    });

    // ─── TOOLTIP ─────────────────────────────────────────────────────────────
    const raycaster = new THREE.Raycaster();
    const mouse     = new THREE.Vector2();
    const tooltip   = document.getElementById('tooltip');

    canvas.addEventListener('mousemove', e => {
        if (dragging) { tooltip.style.display = 'none'; return; }
        mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);

        const hits = raycaster.intersectObjects(activePoints.filter(p => p.mesh.visible).map(p => p.mesh));
        if (hits.length > 0) {
            const pt = activePoints.find(p => p.mesh === hits[0].object);
            if (pt) {
                const d = new Date(pt.packet.timestamp * 1000);
                document.getElementById('tt-ip').textContent = pt.packet.ip || '?.?.?.?';
                document.getElementById('tt-ts').textContent = d.toUTCString();
                const s = document.getElementById('tt-sus');
                if (pt.isSus) { s.textContent = '⚠ SUSPICIOUS'; s.className = 't-sus s'; }
                else           { s.textContent = '✓ NORMAL';      s.className = 't-sus n'; }
                tooltip.style.display = 'block';
                tooltip.style.left = (e.clientX + 14) + 'px';
                tooltip.style.top  = (e.clientY - 14) + 'px';
            }
        } else {
            tooltip.style.display = 'none';
        }
    });

    // ─── DATA POLLING ────────────────────────────────────────────────────────
    let allPackets      = [];
    let lastCount       = 0;
    const countryCounts = {};
    const timeBuckets   = {};

    async function poll() {
        try {
            const res     = await fetch('http://127.0.0.1:5000/data');
            const packets = await res.json();

            if (packets.length > lastCount) {
                packets.slice(lastCount).forEach(p => {
                    allPackets.push(p);
                    spawnPoint(p);

                    const cc = p.country || '??';
                    countryCounts[cc] = (countryCounts[cc] || 0) + 1;

                    const bk = Math.floor(p.timestamp / 60) * 60;
                    if (!timeBuckets[bk]) timeBuckets[bk] = { sus: 0, nor: 0 };
                    p.suspicious > 0.5 ? timeBuckets[bk].sus++ : timeBuckets[bk].nor++;
                });
                lastCount = packets.length;
                refreshPanel();
                refreshTimeline();
            }
        } catch (e) {
            // Flask not ready yet — retry on next tick
        }
    }

    function refreshPanel() {
        const total = allPackets.length;
        const sus   = allPackets.filter(p => p.suspicious > 0.5).length;
        const nor   = total - sus;
        const rate  = total ? (sus / total * 100) : 0;

        document.getElementById('st-total').textContent = total;
        document.getElementById('st-sus').textContent   = sus;
        document.getElementById('st-nor').textContent   = nor;
        document.getElementById('rate-pct').textContent = rate.toFixed(1) + '%';
        document.getElementById('rate-bar').style.width = rate.toFixed(1) + '%';

        const sorted = Object.entries(countryCounts).sort((a,b) => b[1]-a[1]).slice(0, 8);
        const maxCnt = sorted[0]?.[1] || 1;
        document.getElementById('top-countries').innerHTML = sorted.map(([cc, cnt], i) => {
            const pct = (cnt / maxCnt * 100).toFixed(0);
            return `<div class="country-row">
                <span class="country-rank">${i+1}</span>
                <span class="country-name">${cc}</span>
                <div class="country-bar-wrap"><div class="country-bar-fill" style="width:${pct}%"></div></div>
                <span class="country-cnt">${cnt}</span>
            </div>`;
        }).join('');
    }

    function refreshTimeline() {
        const svg = document.getElementById('timeline-svg');
        const W   = svg.parentElement.clientWidth - 28;
        const H   = 55;
        svg.setAttribute('viewBox', `0 0 ${W} ${H}`);

        const bks = Object.entries(timeBuckets)
            .map(([t, v]) => ({ t: +t, ...v }))
            .sort((a, b) => a.t - b.t);

        if (bks.length < 1) return;

        const maxV = Math.max(...bks.map(b => b.sus + b.nor), 1);
        const bw   = W / bks.length;
        let html   = '';

        bks.forEach((b, i) => {
            const total = b.sus + b.nor;
            const tH = (total / maxV) * (H - 4);
            const sH = (b.sus   / maxV) * (H - 4);
            const nH = tH - sH;
            const x  = i * bw;
            if (nH > 0) html += `<rect x="${x+1}" y="${H-nH}"  width="${bw-2}" height="${nH}" fill="#00d4ff" opacity="0.75"/>`;
            if (sH > 0) html += `<rect x="${x+1}" y="${H-tH}" width="${bw-2}" height="${sH}" fill="#ff3d5a" opacity="0.9"/>`;
        });
        html += `<line x1="0" y1="${H}" x2="${W}" y2="${H}" stroke="rgba(0,212,255,0.2)" stroke-width="1"/>`;
        svg.innerHTML = html;
    }

    function setFilter(mode) {
        currentFilter = mode;
        document.getElementById('btn-all').className = 'fbtn' + (mode==='all' ? ' f-all':'');
        document.getElementById('btn-sus').className = 'fbtn' + (mode==='sus' ? ' f-sus':'');
        document.getElementById('btn-nor').className = 'fbtn' + (mode==='nor' ? ' f-nor':'');
        activePoints.forEach(p => { p.mesh.visible = shouldShow(p.isSus); });
    }

    let autoRotate = true;

    function toggleRotation() {
        autoRotate = !autoRotate;
        const btn = document.getElementById('btn-pause');
        if (autoRotate) {
            btn.textContent = '⏸ Pause Rotation';
            btn.className = 'fbtn f-pause';
        } else {
            btn.textContent = '▶ Resume Rotation';
            btn.className = 'fbtn f-paused';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        if (!dragging && autoRotate) globeGroup.rotation.y += 0.0015;
        renderer.render(scene, camera);
    }

    animate();
    poll();
    setInterval(poll, 1000);

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        refreshTimeline();
    });
    </script>
</body>
</html>
